name: MySQL Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  mysql-ci:
    name: PHP ${{ matrix.php }} - MySQL
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
          extensions: openssl, zlib, bcmath, mbstring

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache/files
          key: dependencies-php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            dependencies-php-${{ matrix.php }}-composer-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Start MySQL Service
        run: docker compose up -d mysql

      - name: Wait for MySQL Health
        run: |
          echo "Waiting for MySQL container to be healthy..."
          ATTEMPTS=0
          # We expect exactly 1 container to report (healthy)
          until [ $ATTEMPTS -eq 30 ] || [ $(docker ps | grep -c "(healthy)") -eq 1 ]; do
            sleep 2
            ATTEMPTS=$((ATTEMPTS+1))
          done
          docker ps

      - name: Run Static Analysis
        run: composer analyze

      - name: Run Tests (MySQL)
        run: DATABASE=mysql ./vendor/bin/pest --compact

      - name: Shutdown Services
        if: always()
        run: docker compose down -v